name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install minimal deps (skip heavy models to keep CI fast)
        run: |
          cd backend
          pip install ruff pytest pytest-asyncio fastapi 'uvicorn[standard]' python-dotenv

      - name: Lint with ruff
        run: |
          cd backend
          ruff check . || echo "::warning::ruff findings (not blocking yet)"

      - name: Unit tests
        run: |
          cd backend
          pytest tests -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npx eslint src || echo "::warning::eslint findings (not blocking yet)"

      - name: Build
        run: |
          cd frontend
          npm run build

  eval-harness-self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Metrics self-test
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from eval.lib.metrics import word_error_rate, keyword_hit, latency_stats, normalize
          assert normalize('Hello, World!') == 'hello world'
          assert word_error_rate('the quick brown fox', 'the slow brown fox') == 0.25
          assert keyword_hit('It is Paris.', ['Paris']) is True
          s = latency_stats([100, 200, 300, 400, 500]); assert s.p50_ms == 300.0
          print('metrics OK')
          "
