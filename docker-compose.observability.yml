# Observability overlay (Phase G.2).
# Use with:   docker compose -f docker-compose.yml -f docker-compose.observability.yml up
# Adds Jaeger (all-in-one) and flips the backend into OTel-on mode pointing
# at it. Open http://localhost:16686 to see traces.

services:
  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP (what the backend posts spans to)
      - "4317:4317"     # OTLP gRPC (unused here; exposed for completeness)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    environment:
      - OTEL_ENABLED=true
      - OTEL_SERVICE_NAME=voice-assistant-backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - OTEL_SAMPLE_RATE=1.0
    depends_on:
      jaeger:
        condition: service_healthy
